<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- backdrop -->
  <rect width="64" height="64" rx="10" fill="#050B14"/>
  <!-- subtle grid glow -->
  <circle cx="32" cy="32" r="22" fill="#1B3A66" opacity="0.35"/>

  <!-- open book / folded paper, centered -->
  <g transform="translate(10 14)">
    <!-- left page -->
    <path d="M2 6 Q2 2 6 2 L22 2 L22 34 L6 34 Q2 34 2 30 Z"
          fill="#E7EDF4" stroke="#0B1A2E" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- right page -->
    <path d="M42 6 Q42 2 38 2 L22 2 L22 34 L38 34 Q42 34 42 30 Z"
          fill="#AFC0D6" stroke="#0B1A2E" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- spine shadow -->
    <line x1="22" y1="2" x2="22" y2="34" stroke="#0B1A2E" stroke-width="1.5"/>

    <!-- text ruling, left page -->
    <line x1="6"  y1="10" x2="18" y2="10" stroke="#0B1A2E" stroke-width="1" opacity="0.55"/>
    <line x1="6"  y1="14" x2="18" y2="14" stroke="#0B1A2E" stroke-width="1" opacity="0.4"/>
    <line x1="6"  y1="18" x2="16" y2="18" stroke="#0B1A2E" stroke-width="1" opacity="0.4"/>
    <line x1="6"  y1="22" x2="18" y2="22" stroke="#0B1A2E" stroke-width="1" opacity="0.4"/>
    <line x1="6"  y1="26" x2="14" y2="26" stroke="#0B1A2E" stroke-width="1" opacity="0.4"/>

    <!-- text ruling, right page -->
    <line x1="26" y1="10" x2="38" y2="10" stroke="#0B1A2E" stroke-width="1" opacity="0.45"/>
    <line x1="26" y1="14" x2="38" y2="14" stroke="#0B1A2E" stroke-width="1" opacity="0.3"/>
    <line x1="26" y1="18" x2="36" y2="18" stroke="#0B1A2E" stroke-width="1" opacity="0.3"/>
    <line x1="26" y1="22" x2="38" y2="22" stroke="#0B1A2E" stroke-width="1" opacity="0.3"/>

    <!-- accent: gold bookmark ribbon -->
    <path d="M32 2 L32 14 L34.5 11 L37 14 L37 2 Z"
          fill="#7EB9E8" stroke="#0B1A2E" stroke-width="1" stroke-linejoin="round"/>
  </g>
</svg>
